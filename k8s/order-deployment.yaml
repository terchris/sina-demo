apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: order-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5002
        env:
        - name: PORT
          value: "5002"
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service:8081"
        - name: INVENTORY_SERVICE_URL
          value: "http://inventory-service:5001"
        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service:8083"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: microservices
spec:
  selector:
    app: order-service
  ports:
  - protocol: TCP
    port: 5002
    targetPort: 5002
  type: NodePort